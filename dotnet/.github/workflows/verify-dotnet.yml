name: Verify .NET

on:
  push:
    paths:
      - 'dotnet/**'
  pull_request:
    paths:
      - 'dotnet/**'

defaults:
  run:
    working-directory: dotnet

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test with coverage and architecture gates
        run: dotnet test --no-build --verbosity normal

      - name: Run example CLI
        run: dotnet run --no-build --project src/MableBank.Cli -- tests/MableBank.Tests/Fixtures/mable_account_balances.csv tests/MableBank.Tests/Fixtures/mable_transactions.csv
