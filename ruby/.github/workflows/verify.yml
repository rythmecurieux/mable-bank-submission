name: Verify

on:
  push:
  pull_request:

jobs:
  ruby:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop

      - name: RSpec
        run: bundle exec rspec

      - name: Run example CLI
        run: ruby bin/mable_bank spec/fixtures/mable_account_balances.csv spec/fixtures/mable_transactions.csv
