name: Verify TypeScript

on:
  push:
    paths:
      - 'nodejs-typescript/**'
  pull_request:
    paths:
      - 'nodejs-typescript/**'

defaults:
  run:
    working-directory: nodejs-typescript

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nodejs-typescript/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run coverage

      - name: Run example CLI
        run: node dist/bin/mable-bank.js test/fixtures/mable_account_balances.csv test/fixtures/mable_transactions.csv
